id: "66c1939b-e01c-4a0b-afe9-550a6ed7d76b"
name: "Windows - User Account Locked Out"
level: 12
size: ">0"
active: true
author: 
    - Vinicius Morais <me@souzo.me>
tags: 
    - windows
    - authentication_failed
    - account_locked
rule: |-
      SELECT
        id::String as uid,
        rule_id,
        rule_description,
        rule_groups,
        alert
      FROM wazuh_alerts
      WHERE 
          timestamp >= now() - INTERVAL 5 MINUTE
          AND has(rule_groups, 'authentication_failures')
          AND rule_id = 60115
