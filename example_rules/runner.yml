datasource:
    type: clickhouse
    host: localhost
    port: 8123
    verify: false
    username: default
    password: default
    database: soc

# Optional: enable high-availability (multi-replica with failover).
# Without this block, Clickdetect runs single-node with in-memory state.
# See https://clickdetect.souzo.me/high-availability/
#redis:
#    url: redis://localhost:6379/0
#    namespace: clickdetect
#    lock_ttl: 1500   # failover latency in seconds (lock auto-renews while running)

# Optional: cap (seconds) on how long a detector cycle may run. On timeout,
# running rules are cancelled so a hung query can't stall the detector.
#max_detector_time: 120

webhooks:
    generic_webhook:
        type: generic
        url: http://localhost:3000/alerts/create/clickdetect
        headers:
          X-Type: test

detectors:
    5m_detector:
        name: "5m interval"
        for: "5m"
        tenant: 'all'
        description: "detect rules with 5 min interval"
        rules:
            - "clickhouse/rules/ad/*.yml"
        webhooks:
            - generic_webhook
        data:
          var1: 'yy'
          var2: 'xx'

    10s_detector:
        name: "10s interval"
        for: "10s"
        tenant: 'all'
        description: "detect rules with 10 seconds interval"
        rules:
            - "clickhouse/rules/windows/*"
        webhooks:
            - generic_webhook
        data:
          var1: 'yy'
          var2: 'xx'

plugins:
  clickagentic: # plugin id
    provider: 'openai' # provider: openai, anthropic, google, huggingface, ollama, openrouter, deepseek
    model: 'gpt-5.2' # get model from your provider
    token: 'xxx'
    from_level: 10 # only run for alerts with alert level >= 10
    ids:
      - "id1"
      - "id2"
      - "id3"
