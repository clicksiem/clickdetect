site_name: Docs - Clicksiem Detector
site_url: https://clickdetect.souzo.me
theme:
  name: material
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - navigation.tabs
    - navigation.path
    # - content.code.select
    # - content.footnote.tooltips
    # - content.tabs.link
    # - header.autohide
    # - navigation.expand
    # - navigation.instant
    # - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    # - navigation.tabs.sticky
    # - toc.integrate
repo_name: clicksiem/clickdetect
repo_url: https://github.com/clicksiem/clickdetect
site_author: Vinicius Morais
copyright: Copyright &copy; 2026 Vinicius Morais
nav:
  - Docs:
    - Introduction: index.md
    - Getting Started: getting-started.md
    - Installation: installation.md
    - Runner: runner.md
    - Rules: rules.md
    - Datasources:
      - Overview: datasource/index.md
      - ClickHouse: datasource/clickhouse.md
      - Elasticsearch: datasource/elasticsearch.md
      - Loki: datasource/loki.md
      - PostgreSQL: datasource/postgresql.md
    - Webhooks:
      - Overview: webhooks/index.md
      - Generic: webhooks/generic.md
      - Teams: webhooks/teams.md
      - Email: webhooks/email.md
      - Forgejo: webhooks/forgejo.md
      - Matrix: webhooks/matrix.md
    - API: api.md
  - Blog:
    - blog/index.md
plugins:
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - blog:
      authors: true
      authors_file: .authors.yml
  - privacy
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

